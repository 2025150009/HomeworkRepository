<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Movie Site - Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

    <h2>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h2>
    <div class="header-links">
        <a href="login.html">로그인</a> | <a href="signup.html">회원가입</a>
    </div>

    <div class="form-container" style="height: 150px;">
        <form action="#" method="POST">
            <div class="form-group">
                <label>아이디 :</label>
                <input type="text" name="login_id" placeholder="아이디 입력" required>
            </div>

            <div class="form-group">
                <label>비밀번호 :</label>
                <input type="password" name="login_pw" placeholder="비밀번호 입력" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Login</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>
        </form>
    </div>

</body>
</html>
