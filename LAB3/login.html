<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMNB - Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="site-container">
        <header class="sliding-header">
            <h1 class="header-title">IMNB - Your Ultimate Movie Information Hub</h1>
        </header>

        <nav class="nav-bar">
            <a href="index.html">Main</a>
            <a href="login.html">Login</a>
            <a href="signup.html">SignUp</a>
        </nav>

        <div class="form-container">
            <h2>Login</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="login_id" placeholder="아이디 입력" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="login_pw" placeholder="비밀번호 입력" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Login</button>
                    <button type="reset" class="btn-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
