<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMNB - Sign Up</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="site-container">
        <header class="sliding-header">
            <h1 class="header-title">IMNB - Your Ultimate Movie Information Hub</h1>
        </header>

        <nav class="nav-bar">
            <a href="index.html">Main</a>
            <a href="login.html">Login</a>
            <a href="signup.html">SignUp</a>
        </nav>

        <div class="form-container">
            <h2>Sign Up</h2>
            <form action="login.html" method="GET">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" autofocus autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label>Birthday</label>
                    <input type="date" name="birthday">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <input type="radio" name="gender" value="male" id="male"><label for="male" style="width:auto;"> Male</label>
                        <input type="radio" name="gender" value="female" id="female"><label for="female" style="width:auto;"> Female</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Grade</label>
                    <input type="number" name="grade" min="1" max="4" step="1" placeholder="1~4">
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label>Security Question</label>
                    <select name="security_question">
                        <option value="" disabled selected>질문을 선택하세요</option>
                        <option value="1">가장 좋아하는 영화는?</option>
                        <option value="2">졸업한 초등학교 이름은?</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Answer</label>
                    <input type="text" name="security_answer">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">Sign Up</button>
                    <button type="reset" class="btn-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
