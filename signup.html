<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Movie Site - Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>

    <h2>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h2>
    <div class="header-links">
        <a href="login.html">로그인</a> | <a href="signup.html">회원가입</a>
    </div>

    <div class="form-container">
        <form action="login.html" method="GET">
            <div class="form-group">
                <label>이름 :</label>
                <input type="text" name="name" autofocus autocomplete="name">
            </div>

            <div class="form-group">
                <label>생일 :</label>
                <input type="date" name="birthday">
            </div>

            <div class="form-group">
                <label>성별 :</label>
                <input type="radio" name="gender" value="male" id="male"><label for="male" style="width:auto; margin-right: 20px;"> 남성</label>
                <input type="radio" name="gender" value="female" id="female"><label for="female" style="width:auto;"> 여성</label>
            </div>

            <div class="form-group">
                <label>학년 :</label>
                <input type="number" name="grade" min="1" max="4" step="1">
            </div>

            <div class="form-group">
                <label>아이디 :</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>비밀번호 :</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>이메일 :</label>
                <input type="email" name="email" placeholder="이메일 입력">
            </div>

            <div class="form-group">
                <label>보안 질문 :</label>
                <select name="security_question">
                    <option value="" disabled selected>질문을 선택하세요</option>
                    <option value="1">가장 좋아하는 영화는?</option>
                    <option value="2">졸업한 초등학교 이름은?</option>
                </select>
            </div>

            <div class="form-group">
                <label>답변 :</label>
                <input type="text" name="security_answer">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Signup</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>
        </form>
    </div>

</body>
</html>
